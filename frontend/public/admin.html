<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Tsivot Hashem Dashboard</title>
<meta name="theme-color" content="#1a2744"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tsivot Dash"/>
<link rel="manifest" href="#"/>
 
<script>
  // ===================== STATE =====================
  let currentUser = null;
  let currentClub = null;
  let isAdmin = false;
  let children = {};
  let missionNames = {};
  let allClubs = {};
  let gifts = [];
  let currentChildId = null;
  let currentPage = 'list'; // 'list' | 'child' | 'admin' | 'boutique'
 
  const giftEmojiMap = {
    'porte-clé': '🔑',
    'casquette': '🧢',
    't-shirt': '👕',
    'bracelet': '📿',
    'peluche': '🧸',
    'ballon': '⚽',
    'livre': '📚',
    'jeu': '🎮',
    'bonbon': '🍬',
    'stylo': '🖊️',
    'sticker': '⭐',
    'puzzle': '🧩',
    'gourde': '🥤',
    'sac': '🎒',
  };

  const Mu = (name) => {
    if (!name) return '🎁';
    const lower = name.toLowerCase();
    for (const [key, emoji] of Object.entries(giftEmojiMap)) {
      if (lower.includes(key)) return emoji;
    }
    return '🎁';
  };

  const DEFAULT_MISSIONS = {
    M1:"Mission 1",M2:"Mission 2",M3:"Mission 3",
    M4:"Mission 4",M5:"Mission 5",M6:"Mission 6",
    M7:"Mission 7",M8:"Mission 8",M9:"Mission 9",
    M10:"Mission 10",M11:"Mission 11 (Finale)",
    M12:"Mission 12 (Finale)",M13:"Mission 13 (Finale)"
  };
 
  const MISSION_DOLLARS = {M1:10,M2:20,M3:30,M4:10,M5:20,M6:30,M7:10,M8:20,M9:30,M10:10,M11:30,M12:30,M13:30};
  const GRADES = [
    {name:"Soldat",pts:0,icon:"🪖",color:"#6b7280"},
    {name:"Caporal",pts:230,icon:"⚔️",color:"#78716c"},
    {name:"Sergent",pts:420,icon:"🎖️",color:"#92400e"},
    {name:"Adjudant",pts:670,icon:"🏅",color:"#b45309"},
    {name:"Adjudant-Chef",pts:900,icon:"🌟",color:"#ca8a04"},
    {name:"Sous-Lieutenant",pts:1140,icon:"💫",color:"#4f46e5"},
    {name:"Lieutenant",pts:1370,icon:"🦅",color:"#7c3aed"},
    {name:"Capitaine",pts:1500,icon:"🦁",color:"#dc2626"},
    {name:"Colonel",pts:1780,icon:"🔥",color:"#ea580c"},
    {name:"General",pts:2010,icon:"⚡",color:"#d97706"},
    {name:"General 1 étoile",pts:2230,icon:"⭐",color:"#cd7f32"},
    {name:"General 2 étoiles",pts:2430,icon:"🌠",color:"#c0c0c0"},
    {name:"General 3 étoiles",pts:2630,icon:"👑",color:"#ffd700"},
  ];
 
  function getGrade(pts){
    let g = GRADES[0];
    for(const gr of GRADES){ if(pts>=gr.pts) g=gr; else break; }
    return g;
  }
  function getNextGrade(pts){
    for(const gr of GRADES){ if(gr.pts>pts) return gr; }
    return null;
  }
 
  // ===================== AUTH =====================
  window.addEventListener('DOMContentLoaded', async () => {
    const storedUser = localStorage.getItem('adminUser');
    if (storedUser) {
      try {
        currentUser = JSON.parse(storedUser);
        currentClub = currentUser.club;
        isAdmin = currentUser.role === 'admin';
        await startListening();
        renderApp();
      } catch (e) {
        localStorage.removeItem('adminUser');
        renderLogin();
      }
    } else {
      renderLogin();
    }
  });
 
  async function startListening(){
    await fetchMissionsFromDb();
    await fetchChildrenFromDb();
  }

  async function fetchMissionsFromDb(){
    try {
      const res = await fetch(`/api/admin/missions/${encodeURIComponent(currentClub)}`);
      const data = await res.json();
      if (data) {
        missionNames = data;
      } else {
        missionNames = {...DEFAULT_MISSIONS};
      }
    } catch(e) {
      console.error("Erreur de chargement des missions:", e);
      missionNames = {...DEFAULT_MISSIONS};
    }
  }

  async function fetchChildrenFromDb(){
    try {
      const url = isAdmin 
        ? `/api/admin/enfants`
        : `/api/admin/enfants?camp=${encodeURIComponent(currentClub)}`;
      const res = await fetch(url);
      const data = await res.json();
      children = {};
      if (Array.isArray(data)) {
        data.forEach(c => {
          let adminData = {};
          try {
            adminData = c.admin_data ? JSON.parse(c.admin_data) : {};
          } catch(e) {
            adminData = {};
          }
          
          children[c.id] = {
            id: c.id,
            uid: c.uid,
            nom: c.nom,
            prenom: c.prenom,
            name: `${c.prenom} ${c.nom}`,
            camp: c.camp,
            totalPoints: Number(c.solde) || 0,
            dollars: Number(c.dollars) || 0,
            missions: adminData.missions || {},
            bonusHistory: adminData.bonusHistory || [],
            lastActivity: adminData.lastActivity || 0,
            createdAt: c.created_at ? new Date(c.created_at).getTime() : Date.now()
          };
        });
      }
      renderApp();
    } catch(e) {
      console.error("Erreur de chargement des enfants:", e);
    }
  }

  async function fetchGiftsFromDb(){
    try {
      const res = await fetch(`/api/boutique/cadeaux`);
      const data = await res.json();
      gifts = Array.isArray(data) ? data : [];
      if(currentPage==='boutique') renderApp();
    } catch(e) {
      console.error("Erreur de chargement des articles :", e);
      gifts = [];
    }
  }

  async function loadAllClubs(){
    await fetchChildrenFromDb();
    allClubs = {};
    allClubs[currentClub] = children;
    renderApp();
  }
 
  // ===================== DATA OPS =====================
  async function saveChild(id, childData){
    const payload = {
      uid: childData.uid,
      nom: childData.nom,
      prenom: childData.prenom,
      solde: childData.totalPoints,
      dollars: childData.dollars,
      camp: childData.camp,
      admin_data: JSON.stringify({
        missions: childData.missions,
        bonusHistory: childData.bonusHistory,
        lastActivity: childData.lastActivity
      })
    };

    try {
      const res = await fetch(`/api/admin/enfant/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const err = await res.json();
        alert("Erreur de sauvegarde : " + err.message);
      } else {
        await fetchChildrenFromDb();
      }
    } catch(err) {
      console.error("Network error updating child:", err);
    }
  }

  async function deleteChild(id){
    try {
      const res = await fetch(`/api/admin/enfant/${id}`, {
        method: 'DELETE'
      });
      if (!res.ok) {
        alert("Erreur lors de la suppression");
      } else {
        await fetchChildrenFromDb();
      }
    } catch(err) {
      alert("Erreur de connexion : " + err.message);
    }
  }

  async function saveMissions(){
    try {
      const res = await fetch(`/api/admin/missions/${encodeURIComponent(currentClub)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ missions: missionNames })
      });
      if (!res.ok) {
        alert("Erreur de sauvegarde des missions");
      }
    } catch(err) {
      console.error("Erreur de connexion lors de la sauvegarde des missions:", err);
    }
  }
 
  function checkMissionReset(child){
    const now = Date.now();
    const last = child.lastActivity||0;
    if (last > 0) {
      const dateNow = new Date(now);
      const dateLast = new Date(last);
      const isDifferentDay = dateNow.getFullYear() !== dateLast.getFullYear() ||
                             dateNow.getMonth() !== dateLast.getMonth() ||
                             dateNow.getDate() !== dateLast.getDate();
      if (isDifferentDay) {
        child.missions = {};
        child.lastActivity = now;
      }
    } else {
      child.lastActivity = now;
    }
    return child;
  }
 
  async function toggleMission(childId, mKey){
    let child = {...children[childId]};
    child = checkMissionReset(child);
    const done = child.missions[mKey]||false;
    if(done){
      child.missions[mKey]=false;
      child.totalPoints = Math.max(0, child.totalPoints-13);
      child.dollars = Math.max(0, child.dollars-(MISSION_DOLLARS[mKey]||0));
    } else {
      child.missions[mKey]=true;
      child.totalPoints += 13;
      child.dollars += MISSION_DOLLARS[mKey]||0;
    }
    child.lastActivity = Date.now();
    await saveChild(childId, child);
  }
 
  async function addBonusPoints(childId, pts, isRemove){
    let child = {...children[childId]};
    const delta = isRemove ? -Math.abs(pts) : Math.abs(pts);
    child.totalPoints = Math.max(0, child.totalPoints+delta);
    child.bonusHistory = child.bonusHistory||[];
    child.bonusHistory.push({delta, date:Date.now()});
    child.lastActivity = Date.now();
    await saveChild(childId, child);
  }

  async function addBonusDollars(childId, amount, isRemove){
    let child = {...children[childId]};
    const delta = isRemove ? -Math.abs(amount) : Math.abs(amount);
    child.dollars = Math.max(0, child.dollars + delta);
    child.lastActivity = Date.now();
    await saveChild(childId, child);
  }
 
  async function resetChildMissions(childId){
    let child = {...children[childId]};
    child.missions = {};
    child.lastActivity = Date.now();
    await saveChild(childId, child);
  }
 
  // ===================== RENDER =====================
  function renderLogin(){
    document.getElementById('app').innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <img src="/logo.png" style="width:90px;height:90px;object-fit:contain;border-radius:12px;margin-bottom:8px;"/>
          <h1>Tsivot Hashem</h1>
          <p>Dashboard</p>
        </div>
        <div id="login-error" class="login-error" style="display:none"></div>
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <input type="text" id="login-email" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn-login" onclick="window._login()">
          <span>Connexion</span> <span>→</span>
        </button>
      </div>
    </div>`;
    document.getElementById('login-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')window._login();});
  }
 
  window._login = async function(){
    const usernameInput = document.getElementById('login-email').value.trim();
    const pwd = document.getElementById('login-pwd').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display='none';
    try {
      const res = await fetch(`/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usernameInput, password: pwd })
      });
      const resData = await res.json();
      if (res.ok) {
        currentUser = resData;
        currentClub = resData.club;
        isAdmin = resData.role === 'admin';
        localStorage.setItem('adminUser', JSON.stringify(resData));
        await startListening();
        renderApp();
      } else {
        errEl.textContent = resData.message || "Nom d'utilisateur ou mot de passe incorrect";
        errEl.style.display='block';
      }
    } catch(e){
      errEl.textContent = "Erreur de connexion au serveur";
      errEl.style.display='block';
    }
  };
 
  function renderApp(){
    if(window.countdownInterval) {
      clearInterval(window.countdownInterval);
      window.countdownInterval = null;
    }
    const app = document.getElementById('app');
    if(currentPage==='list') app.innerHTML = renderListPage();
    else if(currentPage==='child') app.innerHTML = renderChildPage();
    else if(currentPage==='admin') app.innerHTML = renderAdminPage();
    else if(currentPage==='boutique') app.innerHTML = renderBoutiquePage();
    attachEvents();
  }
 
  function renderListPage(){
    const q = window._searchQ||'';
    const filtered = Object.entries(children).filter(([id,c])=>
      c.name.toLowerCase().includes(q.toLowerCase())
    ).sort((a,b)=>b[1].totalPoints-a[1].totalPoints);
 
    return `
    <div class="app-container">
      <header class="app-header">
        <div class="header-left">
          <img src="/logo.png" style="width:36px;height:36px;object-fit:contain;border-radius:6px;"/>
          <div>
            <h1 class="header-title">Tsivot Hashem</h1>
            <p class="header-sub">${isAdmin?'Admin — tous les clubs':(currentClub ? 'Club '+currentClub.charAt(0).toUpperCase()+currentClub.slice(1) : '')}</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" onclick="window.parent.location.href = '/'" title="Retour au Kiosque">🏠</button>
          <button class="icon-btn" onclick="window._goBoutiqueManagement()" title="Gérer la boutique">🎁</button>
          <button class="icon-btn" onclick="window._goAdmin()" title="Paramètres missions">⚙️</button>
          <button class="icon-btn" onclick="window._logout()" title="Déconnexion">🚪</button>
        </div>
      </header>
 
      <div class="search-add-bar">
        <input class="search-input" type="text" placeholder="🔍 Rechercher un soldat..." 
               value="${q}" oninput="window._search(this.value)"/>
        <button class="btn-add" onclick="window._addChild()">+ Ajouter</button>
      </div>
 
      <div class="stats-banner">
        <div class="stat-item">
          <span class="stat-val">${Object.keys(children).length}</span>
          <span class="stat-lbl">Soldats</span>
        </div>
        <div class="stat-item">
          <span class="stat-val">${Object.values(children).reduce((s,c)=>s+c.totalPoints,0)}</span>
          <span class="stat-lbl">Points total</span>
        </div>
        <div class="stat-item">
          <span class="stat-val">${Object.values(children).filter(c=>Object.values(c.missions||{}).some(Boolean)).length}</span>
          <span class="stat-lbl">Actifs</span>
        </div>
      </div>
 
      <div class="children-grid">
        ${filtered.length===0?`<div class="empty-state">Aucun soldat trouvé<br><small>Cliquez sur + Ajouter</small></div>`:''}
        ${filtered.map(([id,child],idx)=>{
          const g = getGrade(child.totalPoints);
          const ng = getNextGrade(child.totalPoints);
          const pct = ng ? Math.round(((child.totalPoints-g.pts)/(ng.pts-g.pts))*100) : 100;
          const missions = child.missions||{};
          const doneCount = Object.values(missions).filter(Boolean).length;
          return `
          <div class="child-card" onclick="window._openChild('${id}')" style="border-left: 4px solid ${g.color}">
            <div class="card-rank">#${idx+1}</div>
            <div class="card-top">
              <div class="card-avatar">${g.icon}</div>
              <div class="card-info">
                <div class="card-name">${child.name}</div>
                <div class="card-grade" style="color:${g.color}">${g.name}</div>
              </div>
              <div class="card-pts">${child.totalPoints}<small>pts</small></div>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${pct}%;background:${g.color}"></div>
            </div>
            <div class="card-footer">
              <span>💰 ${child.dollars||0}$</span>
              <span>✅ ${doneCount}/13</span>
              ${ng?`<span>→ ${ng.name}</span>`:`<span>🏆 MAX</span>`}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
 
  function renderChildPage(){
    const child = children[currentChildId];
    if(!child) { currentPage='list'; return renderListPage(); }
    const g = getGrade(child.totalPoints);
    const ng = getNextGrade(child.totalPoints);
    const pct = ng ? Math.round(((child.totalPoints-g.pts)/(ng.pts-g.pts))*100) : 100;
    const missions = child.missions||{};
    const doneCount = Object.values(missions).filter(Boolean).length;
 
    const missionKeys = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12','M13'];
 
    return `
    <div class="app-container">
      <header class="app-header">
        <button class="icon-btn" onclick="window._back()">← Retour</button>
        <h2 class="header-title">${child.name}</h2>
        <button class="icon-btn danger" onclick="window._confirmDelete('${currentChildId}')">🗑️</button>
      </header>
 
      <div class="child-hero">
        <div class="hero-avatar">${g.icon}</div>
        <div class="hero-grade" style="color:${g.color}">${g.name}</div>
        <div class="hero-pts">${child.totalPoints} pts</div>
        <div class="progress-bar-wrap hero-progress">
          <div class="progress-bar-fill" style="width:${pct}%;background:${g.color}"></div>
        </div>
        ${ng?`<div class="hero-next">→ ${ng.name} dans ${ng.pts-child.totalPoints} pts (${pct}%)</div>`:`<div class="hero-next">🏆 Grade maximum atteint !</div>`}
        <div class="hero-stats">
          <div class="hstat">💰 ${child.dollars||0}$</div>
          <div class="hstat">✅ ${doneCount}/13</div>
        </div>
      </div>
 
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Missions du jour</span>
        <span id="reset-countdown" class="reset-countdown">Réinitialisation dans --:--:--</span>
      </div>
      <div class="missions-list">
        ${missionKeys.map(mk=>{
          const done = missions[mk]||false;
          const $ = MISSION_DOLLARS[mk];
          const isFinal = mk==='M11'||mk==='M12'||mk==='M13';
          const dollarClass = $===10?'dollar-low':$===20?'dollar-mid':'dollar-high';
          return `
          <div class="mission-row ${done?'mission-done':''}" onclick="window._toggleMission('${mk}')">
            <div class="mission-check">${done?'✅':'⬜'}</div>
            <div class="mission-text">
              <span class="mission-name">${missionNames[mk]||DEFAULT_MISSIONS[mk]}</span>
              ${isFinal?'<span class="finale-badge">FINALE</span>':''}
            </div>
            <div class="mission-dollar ${dollarClass}">+${$}$</div>
          </div>`;
        }).join('')}
      </div>
 
      <div class="section-title">Points bonus / retrait</div>
      <div class="bonus-area">
        <div class="bonus-box">
          <div class="bonus-label">➕ Ajouter des points</div>
          <div class="bonus-row">
            <input type="number" id="bonus-add" placeholder="0" min="0" class="bonus-input"/>
            <button class="btn-bonus add" onclick="window._applyBonus(false)">Valider</button>
          </div>
        </div>
        <div class="bonus-box">
          <div class="bonus-label">➖ Retirer des points</div>
          <div class="bonus-row">
            <input type="number" id="bonus-remove" placeholder="0" min="0" class="bonus-input"/>
            <button class="btn-bonus remove" onclick="window._applyBonus(true)">Valider</button>
          </div>
        </div>
      </div>

      <div class="section-title">Dollars bonus / retrait</div>
      <div class="bonus-area">
        <div class="bonus-box">
          <div class="bonus-label">➕ Ajouter des dollars</div>
          <div class="bonus-row">
            <input type="number" id="bonus-add-dollars" placeholder="0" min="0" class="bonus-input"/>
            <button class="btn-bonus add" onclick="window._applyBonusDollars(false)">Valider</button>
          </div>
        </div>
        <div class="bonus-box">
          <div class="bonus-label">➖ Retirer des dollars</div>
          <div class="bonus-row">
            <input type="number" id="bonus-remove-dollars" placeholder="0" min="0" class="bonus-input"/>
            <button class="btn-bonus remove" onclick="window._applyBonusDollars(true)">Valider</button>
          </div>
        </div>
      </div>
 
      <div class="reset-area">
        <button class="btn-reset" onclick="window._resetMissions()">🔄 Réinitialiser les missions du jour</button>
      </div>
    </div>`;
  }
 
  function renderAdminPage(){
    const mKeys = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12','M13'];
    return `
    <div class="app-container">
      <header class="app-header">
        <button class="icon-btn" onclick="window._back()">← Retour</button>
        <h2 class="header-title">⚙️ Paramètres missions</h2>
        <div></div>
      </header>
      <div class="admin-intro">Renommez les missions. Les noms s'affichent pour tous les enfants du club.</div>
      <div class="admin-missions">
        ${mKeys.map(mk=>{
          const $=MISSION_DOLLARS[mk];
          const isFinal=mk==='M11'||mk==='M12'||mk==='M13';
          return `
          <div class="admin-mission-item">
            <div class="admin-mission-header">
              <span class="admin-mission-key">${mk}</span>
              <span class="admin-mission-dollar ${$===10?'dollar-low':$===20?'dollar-mid':'dollar-high'}">+${$}$</span>
              ${isFinal?'<span class="finale-badge">FINALE</span>':''}
            </div>
            <textarea class="admin-textarea" id="admin-${mk}" maxlength="500"
              placeholder="${DEFAULT_MISSIONS[mk]}"
              oninput="document.getElementById('count-${mk}').textContent=this.value.length+'/500'"
            >${missionNames[mk]||DEFAULT_MISSIONS[mk]}</textarea>
            <div class="char-count" id="count-${mk}">${(missionNames[mk]||DEFAULT_MISSIONS[mk]).length}/500</div>
          </div>`;
        }).join('')}
      </div>
      <button class="btn-save" onclick="window._saveMissions()">💾 Enregistrer les missions</button>
    </div>`;
  }
 
  function renderBoutiquePage(){
    return `
    <div class="app-container">
      <header class="app-header">
        <button class="icon-btn" onclick="window._back()">← Retour</button>
        <h2 class="header-title">🎁 Gestion Boutique</h2>
        <div></div>
      </header>

      <div class="admin-new-user" style="margin-bottom: 24px;">
        <div class="section-title">➕ Ajouter un article</div>
        <div class="form-group">
          <label>Nom de l'article</label>
          <input type="text" id="gift-name" class="bonus-input" placeholder="ex: Gourde Métal"/>
        </div>
        <div class="form-group">
          <label>Prix ($)</label>
          <input type="number" id="gift-price" class="bonus-input" placeholder="ex: 80" min="1"/>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="gift-stock" class="bonus-input" placeholder="ex: 15" min="0"/>
        </div>
        <button class="btn-save" onclick="window._addGift()">Créer l'article</button>
      </div>

      <div class="section-title">📦 Liste des articles & Stocks</div>
      <div class="admin-missions" style="margin-top: 8px;">
        ${gifts.length === 0 ? `<div class="empty-state">Aucun article trouvé</div>` : ''}
        ${gifts.map(g => {
          return `
          <div class="admin-mission-item" style="display: flex; flex-direction: column; gap: var(--space-xs); padding: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <span style="font-weight: 700; font-size: 1.1rem;">
                ${g.nom}
              </span>
              <span class="badge badge--price" style="background: var(--surface2); color: var(--gold); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; font-weight: bold;">
                ${g.prix} $
              </span>
            </div>
            
            <div style="display: flex; gap: 8px; align-items: center; margin-top: var(--space-xs); width: 100%;">
              <div class="form-group" style="flex: 1; margin: 0;">
                <label style="font-size: 0.8rem; opacity: 0.75; margin-bottom: 4px;">Stock actuel</label>
                <input type="number" id="stock-${g.id}" class="bonus-input" value="${g.stock}" min="0" style="padding: 6px var(--space-xs);"/>
              </div>
              <div class="form-group" style="flex: 1; margin: 0;">
                <label style="font-size: 0.8rem; opacity: 0.75; margin-bottom: 4px;">Prix ($)</label>
                <input type="number" id="price-${g.id}" class="bonus-input" value="${g.prix}" min="1" style="padding: 6px var(--space-xs);"/>
              </div>
            </div>

            <div style="display: flex; gap: var(--space-xs); margin-top: var(--space-xs); width: 100%;">
              <button class="btn-save" onclick="window._updateGift(${g.id})" style="flex: 2; margin: 0; padding: var(--space-xs) var(--space-sm); font-size: 0.9rem;">
                💾 Mettre à jour
              </button>
              <button class="btn-bonus remove" onclick="window._deleteGift(${g.id})" style="flex: 1; margin: 0; padding: var(--space-xs) var(--space-sm); font-size: 0.9rem; border-radius: var(--radius); border: none;">
                🗑️ Supprimer
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
 
  // ===================== EVENTS =====================
  function attachEvents(){
    // search keydown for add child
    const si = document.getElementById('login-email');
    if(si) si.focus();

    // Preserve focus and cursor position on search input during live typing
    const searchInput = document.querySelector('.search-input');
    if(searchInput) {
      searchInput.focus();
      const len = searchInput.value.length;
      searchInput.setSelectionRange(len, len);
    }

    // Handle daily mission reset countdown
    const countdownEl = document.getElementById('reset-countdown');
    if (countdownEl) {
      const now = new Date();
      let targetMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
      
      function updateTimer() {
        const currentDate = new Date();
        let diffMs = targetMidnight - currentDate;
        
        if (diffMs <= 0) {
          countdownEl.textContent = "Réinitialisation...";
          targetMidnight = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate() + 1, 0, 0, 0, 0);
          setTimeout(() => { fetchChildrenFromDb(); }, 1000);
          return;
        }
        
        const hours = String(Math.floor(diffMs / (60 * 60 * 1000))).padStart(2, '0');
        const minutes = String(Math.floor((diffMs % (60 * 60 * 1000)) / (60 * 1000))).padStart(2, '0');
        const seconds = String(Math.floor((diffMs % (60 * 1000)) / 1000)).padStart(2, '0');
        countdownEl.textContent = `Réinitialisation dans ${hours}:${minutes}:${seconds}`;
      }
      updateTimer();
      window.countdownInterval = setInterval(updateTimer, 1000);
    }
  }
 
  window._search = function(v){ window._searchQ=v; renderApp(); };
  window._back = function(){ currentPage='list'; renderApp(); };
  window._logout = function(){
    currentUser = null;
    currentClub = null;
    isAdmin = false;
    localStorage.removeItem('adminUser');
    renderLogin();
  };
  window._goAdmin = function(){ currentPage='admin'; renderApp(); };
  window._goBoutiqueManagement = async function(){
    currentPage = 'boutique';
    await fetchGiftsFromDb();
    renderApp();
  };

  window._addGift = async function(){
    const nom = document.getElementById('gift-name').value.trim();
    const prix = parseInt(document.getElementById('gift-price').value);
    const stock = parseInt(document.getElementById('gift-stock').value);

    if(!nom || isNaN(prix) || isNaN(stock)) {
      alert("Veuillez remplir tous les champs");
      return;
    }

    try {
      const res = await fetch(`/api/admin/cadeaux`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, prix, stock })
      });
      const data = await res.json();
      if (!res.ok) {
        alert("Erreur: " + data.message);
      } else {
        alert("Article ajouté avec succès !");
        document.getElementById('gift-name').value = '';
        document.getElementById('gift-price').value = '';
        document.getElementById('gift-stock').value = '';
        await fetchGiftsFromDb();
      }
    } catch(err) {
      alert("Erreur réseau : " + err.message);
    }
  };

  window._updateGift = async function(id){
    const stock = parseInt(document.getElementById(`stock-${id}`).value);
    const prix = parseInt(document.getElementById(`price-${id}`).value);
    
    const gift = gifts.find(g => g.id === id);
    if (!gift) return;

    if (isNaN(stock) || isNaN(prix)) {
      alert("Valeurs incorrectes");
      return;
    }

    try {
      const res = await fetch(`/api/admin/cadeaux/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom: gift.nom, prix, stock })
      });
      const data = await res.json();
      if (!res.ok) {
        alert("Erreur: " + data.message);
      } else {
        alert("Article mis à jour !");
        await fetchGiftsFromDb();
      }
    } catch(err) {
      alert("Erreur réseau : " + err.message);
    }
  };

  window._deleteGift = async function(id){
    if(!confirm("Supprimer cet article définitivement ?")) return;

    try {
      const res = await fetch(`/api/admin/cadeaux/${id}`, {
        method: 'DELETE'
      });
      const data = await res.json();
      if (!res.ok) {
        alert("Erreur: " + data.message);
      } else {
        alert("Article supprimé !");
        await fetchGiftsFromDb();
      }
    } catch(err) {
      alert("Erreur réseau : " + err.message);
    }
  };
 
  window._openChild = async function(id){
    currentChildId=id;
    currentPage='child';
    
    let child = {...children[id]};
    if (child) {
      const last = child.lastActivity || 0;
      const now = Date.now();
      const dateNow = new Date(now);
      const dateLast = new Date(last);
      const isDifferent = last > 0 && (
        dateNow.getFullYear() !== dateLast.getFullYear() ||
        dateNow.getMonth() !== dateLast.getMonth() ||
        dateNow.getDate() !== dateLast.getDate()
      );
      
      if (isDifferent) {
        child.missions = {};
        child.lastActivity = now;
        await saveChild(id, child);
      } else if (last === 0) {
        child.lastActivity = now;
        await saveChild(id, child);
      } else {
        renderApp();
      }
    } else {
      renderApp();
    }
  };
 
  window._addChild = async function(){
    const uid = prompt("UID de la carte NFC (ex: 12345678) :");
    if(!uid || !uid.trim()) return;
    const prenom = prompt("Prénom de l'enfant (ex: Levi) :");
    if(!prenom || !prenom.trim()) return;
    const nom = prompt("Nom de l'enfant (ex: Cohen) :");
    if(!nom || !nom.trim()) return;
    
    let camp = currentClub;
    if (isAdmin) {
      camp = prompt("Camp de l'enfant (ex: Camp Alpha, Camp Beta, Camp Gamma) :");
      if (!camp || !camp.trim()) return;
      camp = camp.trim();
    }
    
    const data = {
      uid: uid.trim(),
      prenom: prenom.trim(),
      nom: nom.trim(),
      solde: 0,
      dollars: 0,
      camp: camp,
      admin_data: JSON.stringify({
        missions: {},
        bonusHistory: [],
        lastActivity: Date.now()
      })
    };
    
    try {
      const res = await fetch(`/api/admin/enfant`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const resData = await res.json();
      if (!res.ok) {
        alert("Erreur: " + (resData.message || "Impossible de créer l'enfant"));
      } else {
        alert("Enfant créé avec succès !");
        await fetchChildrenFromDb();
      }
    } catch(err) {
      alert("Erreur de connexion : " + err.message);
    }
  };
 
  window._toggleMission = async function(mk){
    if(!currentChildId) return;
    await toggleMission(currentChildId, mk);
  };
 
  window._applyBonus = async function(isRemove){
    const inputId = isRemove?'bonus-remove':'bonus-add';
    const val = parseInt(document.getElementById(inputId).value)||0;
    if(val<=0) return;
    await addBonusPoints(currentChildId, val, isRemove);
    document.getElementById(inputId).value='';
  };

  window._applyBonusDollars = async function(isRemove){
    const inputId = isRemove?'bonus-remove-dollars':'bonus-add-dollars';
    const val = parseInt(document.getElementById(inputId).value)||0;
    if(val<=0) return;
    await addBonusDollars(currentChildId, val, isRemove);
    document.getElementById(inputId).value='';
  };
 
  window._resetMissions = async function(){
    if(!confirm("Réinitialiser les missions du jour pour ce soldat ?")) return;
    await resetChildMissions(currentChildId);
  };
 
  window._confirmDelete = function(id){
    const child = children[id];
    if(!child) return;
    if(!confirm(`Supprimer ${child.name} définitivement ?`)) return;
    deleteChild(id);
    currentPage='list';
    renderApp();
  };
 
  window._saveMissions = async function(){
    const mKeys = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12','M13'];
    mKeys.forEach(mk=>{
      const el = document.getElementById('admin-'+mk);
      if(el) missionNames[mk] = el.value||DEFAULT_MISSIONS[mk];
    });
    await saveMissions();
    alert("Missions enregistrées !");
  };
 
  // Vue admin / superadmin methods removed.
 
  function showError(msg){
    document.getElementById('app').innerHTML=`<div style="color:red;padding:20px">${msg}</div>`;
  }
</script>
 
<style>

    border:1px solid var(--border);border-radius:12px;padding:16px;}
</style>
