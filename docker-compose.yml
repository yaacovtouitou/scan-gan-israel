services:
  db:
    image: mysql:8.0
    container_name: camp_nfc_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: camp_nfc
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - camp_nfc_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: camp_nfc_pma
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - camp_nfc_network

networks:
  camp_nfc_network:
    driver: bridge

volumes:
  db_data:
